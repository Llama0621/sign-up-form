<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div id="left">
            <div id="odinContainer">
                <img src="images/odin-lined.png" height="100px" width="auto">
                <p id="text">Odin</p>
            </div>
            <footer>Photo by <u>Halie West </u>on <u>Unsplash</u></footer>
        </div>
        <div id="right">
            <div id="speech">
                <p id="first">This is not a real service! You know you need something <br> like this in your life to help you realize your deepest dreams. <br> Sign up <i>now</i> to get started.</p>
                <p>You know <i>you</i> want to.</p>
            </div>
            <div id="login">
                <p id="do">Let's do this!</p>
                <div id="layout">
                    <form id="accountCreation" action="/my-handling-form-page" method="post">
                        <div>
                            <label for="name">First Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div>
                            <label for="last">Last Name</label>
                            <input type="text" id="last" name="last" required>
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div>
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div>
                            <label for="pass">Password</label>
                            <input type="password" id="pass" name="pass1" pattern=".{8,}" title="Password must be at least 8 characters." required>
                        </div>
                        <div>
                            <label for="pass2">Confirm Password</label>
                            <input type="password" id="pass2" name="pass2" pattern=".{8,}" title="Password must be at least 8 characters." required>
                        </div>
                    </form>
                </div>
            </div>
            <div id="create">
                <button form="accountCreation" type="submit">Create Account</button>
                <p>Already have an account? <span style="color:#596D48; font-weight: bold">Log in</span></p>
            </div>
        </div>
    </div>
</body>
</html>
